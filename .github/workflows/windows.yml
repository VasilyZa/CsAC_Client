name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-installer:
    name: Windows x64 NSIS installer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full nsis mingw-w64

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,x86_64-pc-windows-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Trunk and Tauri CLI
        run: |
          cargo install trunk --locked
          cargo install tauri-cli --locked

      - name: Prepare bundled WebView2 runtime
        run: scripts/prepare-webview2-runtime.sh

      - name: Build Windows installer
        run: cargo tauri build --target x86_64-pc-windows-gnu

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CsAC-Client-Windows-x64-Installer
          path: target/x86_64-pc-windows-gnu/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: CsAC-Client-Windows-x64-Portable
          path: target/x86_64-pc-windows-gnu/release/csac_client.exe
          if-no-files-found: error
